services:
  poller:
    build: .
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - ROLE=poller
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    ports:
      - "1398:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - ROLE=api
    depends_on:
      - poller
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
