services:
  poller:
    build: .
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - ROLE=poller
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api-1:
    build: .
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - ROLE=api
    depends_on:
      - poller
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.75
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  api-2:
    build: .
    ports:
      - "127.0.0.1:3002:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - ROLE=api
    depends_on:
      - poller
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.75
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
